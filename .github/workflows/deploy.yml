name: Deploy To VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Upload source to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          source: "."
          target: "/opt/agrichainmarket"
          overwrite: true
          rm: false
          strip_components: 0

      - name: Restart containers on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e
            cd /opt/agrichainmarket
            if [ ! -f ".env" ]; then
              echo "Missing /opt/agrichainmarket/.env on VPS"
              exit 1
            fi
            if docker compose version >/dev/null 2>&1; then
              COMPOSE_CMD="docker compose"
            elif command -v docker-compose >/dev/null 2>&1; then
              COMPOSE_CMD="docker-compose"
            else
              echo "Docker Compose is not installed on VPS"
              exit 1
            fi

            $COMPOSE_CMD down || true
            $COMPOSE_CMD up -d --build
            sleep 5
            if ! curl -fsS http://127.0.0.1:3000/ > /dev/null; then
              echo "Health check failed after deploy"
              $COMPOSE_CMD logs --tail=200
              exit 1
            fi
            docker image prune -f
